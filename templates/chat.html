{% extends "layout.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="card-title">Chat Assistant</h4>
    <p class="text-muted">Ask questions about uploaded documents, summaries, or just test the assistant.</p>

    <div id="chat-box" style="height:400px; overflow:auto; border:1px solid #e9ecef; padding:10px; border-radius:6px; background:white;">
      <!-- messages will be injected here -->
    </div>

    <form id="chat-form" class="mt-3 d-flex gap-2">
      <input type="text" id="chat-input" class="form-control" placeholder="Type your message..." autocomplete="off" />
      <button type="submit" class="btn btn-primary">Send</button>
    </form>

    <div id="chat-status" class="small text-muted mt-2"></div>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chat-box');
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');
  const chatStatus = document.getElementById('chat-status');

  // session id (simple client-side session identifier)
  const SESSION_ID = 'web-' + (localStorage.getItem('sdh_session') || (Math.random().toString(36).slice(2)));
  localStorage.setItem('sdh_session', SESSION_ID);

  // helper to append messages
  function appendMessage(who, text) {
    const wrapper = document.createElement('div');
    wrapper.style.marginBottom = '10px';
    if (who === 'user') {
      wrapper.innerHTML = `<div style="text-align:right"><b>You</b></div><div style="background:#e9f2ff;display:inline-block;padding:8px;border-radius:8px;max-width:80%;">${escapeHtml(text)}</div>`;
    } else {
      wrapper.innerHTML = `<div><b>Assistant</b></div><div style="background:#f1f3f5;display:inline-block;padding:8px;border-radius:8px;max-width:80%;">${escapeHtml(text)}</div>`;
    }
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'" :'&#39;'})[m]; });
  }

  async function loadHistory() {
    chatStatus.textContent = 'Loading history...';
    try {
      const res = await fetch(`{{ url_for('chat_history') }}?session_id=${SESSION_ID}`, { credentials: 'same-origin' });
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      chatBox.innerHTML = '';
      (data.history || []).forEach(item => {
        appendMessage(item.role === 'user' ? 'user' : 'assistant', item.message);
      });
      chatStatus.textContent = '';
    } catch (e) {
      chatStatus.textContent = 'Could not load chat history.';
      console.warn('loadHistory error', e);
    }
  }

  async function sendMessage(prompt) {
    appendMessage('user', prompt);
    chatInput.value = '';
    chatStatus.textContent = 'Assistant is typing…';

    try {
      const res = await fetch('{{ url_for("chat_send") }}', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, prompt })
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error('status ' + res.status + ' : ' + txt);
      }
      const j = await res.json();
      appendMessage('assistant', j.reply || '(no reply)');
      chatStatus.textContent = '';
    } catch (err) {
      appendMessage('assistant', 'Error: could not get reply. See console.');
      chatStatus.textContent = 'Error sending message.';
      console.error('sendMessage error', err);
    }
  }

  chatForm.addEventListener('submit', (ev) => {
    ev.preventDefault();
    const v = chatInput.value.trim();
    if (!v) return;
    sendMessage(v);
  });

  // init
  window.addEventListener('DOMContentLoaded', function(){
    loadHistory();
  });
</script>
{% endblock %}
