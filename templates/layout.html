<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "Smart Document Hub" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color:#f5f7fa; }
    .navbar-brand { font-weight:600; letter-spacing:0.5px; }
    .content-container { padding: 30px; }
    footer { text-align:center; margin-top:30px; font-size:13px; color:#777; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Smart Document Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/">Upload</a></li>
        <li class="nav-item"><a class="nav-link {% if '/history' in request.path %}active{% endif %}" href="{{ url_for('history_page') }}">History</a></li>
        <li class="nav-item"><a class="nav-link {% if '/chat' in request.path %}active{% endif %}" href="{{ url_for('chat_page') }}">Chat</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="content-container container">
  {% block content %}{% endblock %}
</div>

<footer>
  &copy; {{ 2025 }} Smart Document Hub
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
