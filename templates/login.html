<!-- templates/login.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login - Smart Document Hub</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto; background:#f3f4f6; padding:32px; }
    .card { max-width:420px; margin:40px auto; background:#fff; padding:20px 22px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.06); }
    label { font-weight:600; display:block; margin-top:10px; color:#111827; }
    input { width:100%; padding:8px; margin-top:6px; border-radius:6px; border:1px solid #e5e7eb; }
    button { margin-top:14px; background:#111827; color:#fff; padding:10px 12px; border-radius:8px; border:none; font-weight:700; cursor:pointer; }
    .flash { padding:8px 10px; border-radius:6px; margin-bottom:10px; }
    .flash.error { background:#fee2e2; color:#b91c1c; }
    .flash.success { background:#ecfccb; color:#365314; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('login', next=next) }}">
      <label>Username</label>
      <input name="username" required value="{{ request.form.username or '' }}" />
      <label>Password</label>
      <input name="password" type="password" required />
      <button type="submit">Sign in</button>
    </form>

    <p style="margin-top:12px; font-size:13px; color:#6b7280;">Use the admin credentials defined in your <code>.env</code>.</p>
  </div>
</body>
</html>
